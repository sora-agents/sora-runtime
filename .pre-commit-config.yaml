repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      # mypy runs in the project venv via uv (not mirrors-mypy's isolated env) so it resolves the
      # project's own deps — mcp, pytest, optional extras — exactly as CI's `uv run mypy` does.
      # An isolated env would need every dependency re-declared under additional_dependencies,
      # duplicating pyproject and drifting; this keeps one source of truth for the type environment.
      - id: mypy
        name: mypy (strict, project venv via uv — matches CI)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      - id: readme-sync
        name: README.md class-name sync check
        entry: uv run python3 scripts/check_readme_sync.py
        language: system
        pass_filenames: false
        files: ^(src/sora/.*\.py|README\.md)$
