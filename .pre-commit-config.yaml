repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: local
    hooks:
      # ruff runs in the project venv via uv (not ruff-pre-commit's isolated install) so the hook
      # and CI's `uv run ruff` share the one pinned ruff — no lint/format version skew (the same
      # one-source-of-truth reason mypy is wired this way below).
      - id: ruff
        name: ruff (project venv via uv — matches CI)
        entry: uv run ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format (project venv via uv — matches CI)
        entry: uv run ruff format
        language: system
        types: [python]
      # mypy runs in the project venv via uv (not mirrors-mypy's isolated env) so it resolves the
      # project's own deps — mcp, pytest, optional extras — exactly as CI's `uv run mypy` does.
      # An isolated env would need every dependency re-declared under additional_dependencies,
      # duplicating pyproject and drifting; this keeps one source of truth for the type environment.
      - id: mypy
        name: mypy (strict, project venv via uv — matches CI)
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
      - id: readme-sync
        name: README.md class-name sync check
        entry: uv run python3 scripts/check_readme_sync.py
        language: system
        pass_filenames: false
        files: ^(src/sora/.*\.py|README\.md)$
      - id: manuals-sync
        name: EXAMPLES.md / manual-fixtures sync check
        entry: uv run python3 scripts/check_manuals_sync.py
        language: system
        pass_filenames: false
        files: ^(EXAMPLES\.md|tests/fixtures/manuals/.*\.md)$
