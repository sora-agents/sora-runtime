repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
      - id: check-toml
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies: []
        pass_filenames: false
        args: ["."]

  - repo: local
    hooks:
      - id: readme-sync
        name: README.md class-name sync check
        entry: uv run python3 scripts/check_readme_sync.py
        language: system
        pass_filenames: false
        files: ^(src/sora/.*\.py|README\.md)$
